
services:
  minio:
    image: minio/minio:latest
    container_name: minio-server
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345678
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - minio_network

  app:
    build: ../app
    container_name: minio-manager
    ports:
      - "5000:5000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345678
    depends_on:
      - minio
    networks:
      - minio_network
    volumes:
      - ../app:/app

networks:
  minio_network:
    driver: bridge

volumes:
  minio_data:
