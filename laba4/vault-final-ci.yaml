apiVersion: batch/v1
kind: Job
metadata:
  name: beauty-vault-pipeline
  namespace: ci-cd
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "myapp-role"
        vault.hashicorp.com/agent-inject-secret-credentials.txt: "secret/myapp/con>
        vault.hashicorp.com/agent-inject-template-credentials.txt: |
          {{- with secret "secret/data/myapp/config" -}}
          export DOCKER_PASSWORD="{{ .Data.data.DOCKER_PASSWORD }}"
          {{- end -}}
    spec:
      serviceAccountName: ci-cd-service-account
      containers:
      - name: ci-runner
        image: bitnami/kubectl:latest
        command: ["/bin/sh"]
        args:
        - "-c"
        - |
          set -e